# ===== APPLICATION =====
spring.application.name=smartdoc

# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/smartdoc
spring.datasource.username=smartdoc_user
spring.datasource.password=smartdoc_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== FILE UPLOAD =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===== LANGCHAIN4J - GEMINI API =====
langchain4j.gemini.api-key=AIzaSyA7UEZsEQxgBpKdpq52V3t4HCkmX4ndK7U
langchain4j.gemini.model-name=gemini-2.0-flash
langchain4j.gemini.temperature=0.2
langchain4j.gemini.max-output-tokens=2048

# ===== LOGGING =====
logging.level.com.example.smartdoc=DEBUG
logging.level.dev.langchain4j=DEBUG

# ===== CUSTOM APP PROPERTIES =====
app.upload-dir=./uploads
app.chunk-size=800
app.chunk-overlap=150
app.top-k-retrieval=5
app.max-history-messages=10